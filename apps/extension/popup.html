<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        font:
          14px system-ui,
          sans-serif;
        background: #0e1320;
        color: #e8ecf4;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 15px;
      }
      label.row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 10px 0;
      }
      .field {
        display: block;
        margin: 10px 0 2px;
        font-size: 12px;
        color: #8b93a7;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid #2a3143;
        border-radius: 6px;
        background: #161c2b;
        color: #e8ecf4;
        font: 12px monospace;
      }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: #8b93a7;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Dealflow Capture</h1>
    <label class="row">
      <span>Captura automática</span>
      <input type="checkbox" id="auto" />
    </label>
    <span class="field">API</span>
    <input type="text" id="apiUrl" placeholder="http://localhost:3001" />
    <span class="field">Web</span>
    <input type="text" id="webUrl" placeholder="http://localhost:5173" />
    <span class="field">API key</span>
    <input type="text" id="apiKey" placeholder="cola sua chave aqui" />
    <p class="hint">
      Abra um produto no Mercado Livre logado na sua conta de afiliado e clique
      em “Capturar oferta”.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
